services:
  db:
    image: postgres:16-alpine
    container_name: aehop-db
    environment:
      POSTGRES_USER: aehop
      POSTGRES_PASSWORD: aehop
      POSTGRES_DB: aehop_db
    ports:
      - "5432:5432"
    volumes:
      - aehop_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aehop-redis
    ports:
      - "6379:6379"
    volumes:
      - aehop_redis:/data
    restart: unless-stopped

volumes:
  aehop_pgdata:
  aehop_redis:
